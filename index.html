<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Duygu Dedektifi - Final Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #ff96fc 50%, #b6deff 100%);
      position: relative;
    }
    
    /* Efektler */
    .stars, .bubbles, .explosion { position: fixed; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }
    .star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
    .bubble { position: absolute; bottom: -100px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: rise 15s infinite ease-in-out; }
    @keyframes rise { 0% { bottom: -100px; opacity: 0; } 100% { bottom: 110vh; opacity: 0; } }
    
    .logo { position: fixed; top: 10px; right: 12px; z-index: 1000; animation: logoPulse 3s ease-in-out infinite; display: flex; align-items: center; gap: 8px; }
    .logo img { height: 80px; width: auto; display: block; }
    @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .container { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; padding: 12px; max-width: 1600px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
    h1 { font-size: 2rem; color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); margin-bottom: 5px; font-weight: 800; }
    .subtitle { color: rgba(255,255,255,0.95); font-size: 1rem; font-weight: 600; }

    .main-content { display: grid; grid-template-columns: 1fr; gap: 12px; flex: 1; overflow-y: auto; }
    @media (min-width: 992px) { .main-content { grid-template-columns: 1fr 350px; overflow: hidden; } }

    .video-wrapper { position: relative; border-radius: 25px; overflow: hidden; border: 5px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.4); background: #000; height: 100%; display: flex; align-items: center; justify-content: center; }
    
    /* Responsive Video Fix */
    #vid { width: 100%; height: 100%; object-fit: fill; }
    #cv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    .popup { position: absolute; top: 15px; left: 50%; transform: translateX(-50%) scale(0); background: linear-gradient(135deg, #FFD93D 0%, #FFA500 100%); color: white; padding: 12px 25px; border-radius: 30px; font-size: 1.2rem; font-weight: 700; border: 4px solid white; box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: transform 0.4s; z-index: 10; }
    .popup.show { transform: translateX(-50%) scale(1); animation: popupBounce 0.6s ease; }
    @keyframes popupBounce { 0% { transform: translateX(-50%) scale(0); } 50% { transform: translateX(-50%) scale(1.1); } 100% { transform: translateX(-50%) scale(1); } }

    .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 5px; min-height: 0; }
    .card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.25); flex-shrink: 0; border: 3px solid rgba(255,255,255,0.8); transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-3px); }
    .card-title { font-size: 1.15rem; font-weight: 700; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    
    .btn { padding: 14px 24px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(0,0,0,0.2); border: 3px solid white; width: 100%; margin-bottom: 10px; color: white;}
    .btn-go { background: linear-gradient(135deg, #4CAF50, #45a049); }
    .btn-stop { background: linear-gradient(135deg, #f44336, #da190b); }
    
    .sens-wrap { padding: 12px; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 18px; }
    .sens-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 700; color: #667eea; }
    .sens-wrap input { width: 100%; accent-color: #667eea; cursor: pointer; }

    .message-box { padding: 14px; background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%); border-radius: 18px; min-height: 65px; display: flex; align-items: center; justify-content: center; }
    .message-text { font-size: 1rem; font-weight: 600; background: linear-gradient(90deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }

    .emo-display { text-align: center; }
    .big-emoji { font-size: 85px; display: block; margin: 12px 0; filter: drop-shadow(0 6px 15px rgba(0,0,0,0.3)); animation: emojiFloat 3s infinite; }
    .big-emoji.celebrate { animation: emojiCelebrate 0.8s; }
    @keyframes emojiFloat { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    @keyframes emojiCelebrate { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .emo-label { font-size: 1.5rem; font-weight: 700; margin-top: 8px; }
    .emo-conf { color: #888; font-size: 0.95rem; margin-top: 5px; font-weight: 600; }
    .mini-emojis { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
    .mini-emoji { font-size: 26px; animation: miniPop 0.5s backwards; }
    @keyframes miniPop { from { transform: scale(0); } to { transform: scale(1); } }

    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .bar-bg { flex: 1; height: 12px; background: #f0f0f0; border-radius: 15px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 15px; transition: width 0.6s; }
    .bar-val { width: 40px; text-align: right; font-size: 0.85rem; font-weight: 700; color: #666; }

    .det-list { max-height: 190px; overflow-y: auto; }
    .det-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 18px; margin-bottom: 8px; color: white; font-weight: 600; animation: itemSlide 0.4s ease; }
    @keyframes itemSlide { from { transform: translateX(-15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .det-icon { font-size: 1.8rem; }

    .loading { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; transition: opacity 0.5s; }
    .loading.hide { opacity: 0; pointer-events: none; }
    .ld-char { font-size: 110px; animation: ldBounce 1.2s infinite; }
    @keyframes ldBounce { 50% { transform: translateY(-30px); } }
    .ld-bar { width: 280px; height: 14px; background: rgba(255,255,255,0.3); border-radius: 15px; margin-top: 25px; border: 3px solid white; overflow: hidden; }
    .ld-fill { height: 100%; background: #FFD93D; transition: width 0.3s; }
    .ld-text { color: white; font-size: 1.6rem; font-weight: 700; margin-top: 25px; }

    .credit { position: fixed; bottom: 12px; right: 15px; background: white; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; z-index: 100; border: 2px solid white; }
    .credit a { color: #667eea; text-decoration: none; font-weight: 700; }
    
    .fly-emoji { position: absolute; font-size: 55px; animation: flyUp 4s forwards; }
    @keyframes flyUp { to { transform: translateY(-150px) scale(1.5) rotate(360deg); opacity: 0; } }
    .confetti { position: absolute; width: 14px; height: 14px; top: -20px; animation: fall 4.5s forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    .star-burst { position: absolute; font-size: 35px; animation: starBurst 1.8s forwards; }
    @keyframes starBurst { 50% { transform: scale(1.8) rotate(180deg); } 100% { transform: scale(0); opacity: 0; } }
  </style>
</head>
<body>
  <div class="loading" id="ld">
    <div class="ld-char">🎨</div>
    <div class="ld-text" id="ldTxt">Yükleniyor...</div>
    <div class="ld-sub" id="ldSub">Hazırlanıyor</div>
    <div class="ld-bar"><div class="ld-fill" id="ldBar"></div></div>
  </div>
  
  <div class="stars" id="stars"></div>
  <div class="bubbles" id="bubbles"></div>
  <div class="explosion" id="expl"></div>
  
  <div class="logo">
    <img src="https://i.ibb.co/S458ym2x/Ads-z-tasar-m.png" alt="Logo">
  </div>
  
  <div class="container">
    <header>
      <h1>🎭 Duygu Dedektifi 🎭</h1>
      <p class="subtitle">Yüzünden duygularını anlıyorum! ✨</p>
    </header>
    
    <div class="main-content">
      <div class="video-wrapper">
        <video id="vid" autoplay muted playsinline></video>
        <canvas id="cv"></canvas>
        <div class="popup" id="popup"></div>
      </div>
      
      <div class="sidebar">
        <div class="card">
          <div class="card-title">🎮 Kontroller</div>
          <div class="controls-card">
            <button class="btn btn-go" id="goBtn">🚀 Başlat</button>
            <button class="btn btn-stop" id="stopBtn" disabled>⏹️ Durdur</button>
            <div class="sens-wrap">
              <div class="sens-label">
                <label>🎚️ Hassasiyet</label>
                <span id="sensVal">25%</span>
              </div>
              <input type="range" id="sensSlider" min="10" max="50" value="25">
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="message-box">
            <div class="message-text" id="msgText">Başlat butonuna tıkla! 🚀</div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-title">😊 Duygun Ne?</div>
          <div class="emo-display">
            <span class="big-emoji" id="bigEmo">🤔</span>
            <div class="emo-label" id="emoLbl">Bekliyor...</div>
            <div class="emo-conf" id="emoConf"></div>
            <div class="mini-emojis" id="miniE"></div>
          </div>
          <div class="bars">
            <div class="bar-row"><span class="bar-emoji">😊</span><div class="bar-bg"><div class="bar-fill" id="bHappy" style="background:linear-gradient(90deg,#FFD93D,#FFA500)"></div></div><span class="bar-val" id="vHappy">0%</span></div>
            <div class="bar-row"><span class="bar-emoji">😢</span><div class="bar-bg"><div class="bar-fill" id="bSad" style="background:linear-gradient(90deg,#74b9ff,#0984e3)"></div></div><span class="bar-val" id="vSad">0%</span></div>
            <div class="bar-row"><span class="bar-emoji">😠</span><div class="bar-bg"><div class="bar-fill" id="bAngry" style="background:linear-gradient(90deg,#ff7675,#d63031)"></div></div><span class="bar-val" id="vAngry">0%</span></div>
            <div class="bar-row"><span class="bar-emoji">😲</span><div class="bar-bg"><div class="bar-fill" id="bSurprised" style="background:linear-gradient(90deg,#a29bfe,#6c5ce7)"></div></div><span class="bar-val" id="vSurprised">0%</span></div>
            <div class="bar-row"><span class="bar-emoji">😐</span><div class="bar-bg"><div class="bar-fill" id="bNeutral" style="background:linear-gradient(90deg,#dfe6e9,#b2bec3)"></div></div><span class="bar-val" id="vNeutral">0%</span></div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-title">👁️ Ne Görüyorum?</div>
          <div class="det-list" id="detList">
            <div class="det-item"><span class="det-icon">🔍</span><div class="det-info"><div class="det-name">Başlat'a bas!</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="credit">
    <span>Mustafa Berke Simsekler © İLKYAR</span>
    <a href="https://github.com/ragno-typhojem" target="_blank" rel="noopener noreferrer">
      GitHub
    </a>
  </div>

  <script>
    let objModel = null, faceOK = false, running = false, sens = 25;
    const CD = { obj: 3000, emo: 2500, msg: 4000 };
    let tObj = 0, tEmo = 0, tMsg = 0;
    let prevObj = '', curEmo = 'neutral';
    let foundSet = new Set();
    const $ = id => document.getElementById(id);

    const emojiMap = {
      happy: ['😊','😄','🥳','🎉','✨','⭐','💛','😁','🌟','💖'],
      sad: ['😢','💧','💙','🥺','💔','😿','🌧️'],
      angry: ['😠','💢','🔥','😤','💥','😡','⚡'],
      surprised: ['😲','😮','🤯','💫','❗','🎆'],
      fearful: ['😨','😰','💜','😱','👻'],
      neutral: ['😐','🙂','💭','🤔','😌']
    };

    const emoData = {
      happy: { tr: 'Mutlu', emoji: '😊', color: '#FFD93D' },
      sad: { tr: 'Üzgün', emoji: '😢', color: '#74b9ff' },
      angry: { tr: 'Kızgın', emoji: '😠', color: '#ff7675' },
      surprised: { tr: 'Şaşkın', emoji: '😲', color: '#a29bfe' },
      fearful: { tr: 'Korkmuş', emoji: '😨', color: '#81ecec' },
      neutral: { tr: 'Normal', emoji: '😐', color: '#dfe6e9' }
    };

    const messages = {
      happy: ['Çok mutlu görünüyorsun! 😊', 'Gülüşün harika! ✨', 'Ne güzel gülüyorsun! 🌟', 'Mutluluğun bulaşıcı! 💛'],
      sad: ['Üzgün görünüyorsun 😢', 'Her şey düzelecek 💙', 'Moralini topla! 🌈', 'Yanındayım! 💜'],
      angry: ['Kızgın görünüyorsun! 😠', 'Sakin ol! 🔥', 'Derin nefes al! 💨', 'Rahatla biraz! 🌊'],
      surprised: ['Çok şaşırdın! 😲', 'Ne oldu? 🤯', 'Vay be! 💫', 'İnanılmaz! ⭐'],
      fearful: ['Korkmuş gibisin 😨', 'Endişelenme! 💜', 'Her şey yolunda! ✨', 'Güvendesin! 🛡️'],
      neutral: ['Normal görünüyorsun 😐', 'Sakin ve huzurlu 🙂', 'İyi görünüyorsun! 👍', 'Dengede! ⚖️']
    };

    const objTr = {
      'person':['İnsan','🧑'],'bicycle':['Bisiklet','🚲'],'car':['Araba','🚗'],
      'cat':['Kedi','🐱'],'dog':['Köpek','🐕'],'bird':['Kuş','🐦'],
      'bottle':['Şişe','🍼'],'cup':['Bardak','☕'],'book':['Kitap','📚'],
      'laptop':['Laptop','💻'],'cell phone':['Telefon','📱'],'clock':['Saat','🕐'],
      'mouse':['Fare','🖱️'],'keyboard':['Klavye','⌨️'],'chair':['Sandalye','🪑']
    };

    function typeMessage(text) {
      const el = $('msgText');
      el.textContent = '';
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) { el.textContent += text[i]; i++; } else { clearInterval(interval); }
      }, 40);
    }

    function createStars() {
      const c = $('stars');
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s`;
        c.appendChild(s);
      }
    }

    function createBubbles() {
      const c = $('bubbles');
      for (let i = 0; i < 15; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 80 + 40;
        b.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-delay:${Math.random()*15}s;animation-duration:${Math.random()*10+15}s`;
        c.appendChild(b);
      }
    }

    function explode(emo) {
      const c = $('expl'), list = emojiMap[emo] || emojiMap.neutral;
      for (let i = 0; i < 15; i++) {
        const e = document.createElement('div');
        e.className = 'fly-emoji';
        e.textContent = list[Math.floor(Math.random() * list.length)];
        e.style.cssText = `left:${Math.random()*100}%;animation-delay:${Math.random()*0.2}s`;
        c.appendChild(e);
        setTimeout(() => e.remove(), 4200);
      }
      const cols = ['#FFD93D','#ff7675','#74b9ff','#a29bfe','#1dd1a1','#fd79a8','#ffeaa7'];
      for (let i = 0; i < 30; i++) {
        const cf = document.createElement('div');
        cf.className = 'confetti';
        cf.style.cssText = `left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'0'}`;
        c.appendChild(cf);
        setTimeout(() => cf.remove(), 4700);
      }
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('div');
        s.className = 'star-burst';
        s.textContent = '⭐';
        s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*0.3}s`;
        c.appendChild(s);
        setTimeout(() => s.remove(), 2000);
      }
    }

    function miniEmojis(emo) {
      const c = $('miniE'), list = emojiMap[emo] || emojiMap.neutral;
      c.innerHTML = list.slice(0,5).map((e,i) => `<span class="mini-emoji" style="animation-delay:${i*0.08}s">${e}</span>`).join('');
    }

    function updateBars(scores) {
      ['happy','sad','angry','surprised','neutral'].forEach(e => {
        const val = scores[e] || 0;
        const pct = Math.min(100, Math.max(0, Math.round(val * 100)));
        const bar = $('b'+e.charAt(0).toUpperCase()+e.slice(1));
        const valEl = $('v'+e.charAt(0).toUpperCase()+e.slice(1));
        if (bar) bar.style.width = pct+'%';
        if (valEl) valEl.textContent = pct+'%';
      });
    }

    function popup(txt, emoji) {
      const p = $('popup');
      p.innerHTML = `${emoji} ${txt}`;
      p.classList.add('show');
      setTimeout(() => p.classList.remove('show'), 2500);
    }

    function updateList(items) {
      const list = $('detList');
      if (!items.length) {
        list.innerHTML = '<div class="det-item"><span class="det-icon">🔍</span><div class="det-info"><div class="det-name">Arıyorum...</div></div></div>';
        return;
      }
      list.innerHTML = items.slice(0,4).map(i => `<div class="det-item"><span class="det-icon">${i.emoji}</span><div class="det-info"><div class="det-name">${i.name}</div><div class="det-conf">%${i.conf}</div></div></div>`).join('');
    }

    function analyzeLandmarks(landmarks) {
      if (!landmarks || landmarks.length < 68) return null;
      const pts = landmarks.positions;
      
      const leftEyeTop = (pts[37].y + pts[38].y) / 2;
      const leftEyeBot = (pts[40].y + pts[41].y) / 2;
      const rightEyeTop = (pts[43].y + pts[44].y) / 2;
      const rightEyeBot = (pts[46].y + pts[47].y) / 2;
      const leftEyeOpen = leftEyeBot - leftEyeTop;
      const rightEyeOpen = rightEyeBot - rightEyeTop;
      const avgEyeOpen = (leftEyeOpen + rightEyeOpen) / 2;
      
      const leftBrowY = (pts[17].y + pts[18].y + pts[19].y + pts[20].y + pts[21].y) / 5;
      const rightBrowY = (pts[22].y + pts[23].y + pts[24].y + pts[25].y + pts[26].y) / 5;
      const avgBrowY = (leftBrowY + rightBrowY) / 2;
      const avgEyeY = ((leftEyeTop + leftEyeBot) / 2 + (rightEyeTop + rightEyeBot) / 2) / 2;
      const browToEyeDist = avgEyeY - avgBrowY;
      
      const mouthLeft = pts[48], mouthRight = pts[54];
      const mouthTop = pts[51], mouthBot = pts[57];
      const mouthTopInner = pts[62], mouthBotInner = pts[66];
      const mouthWidth = Math.abs(mouthRight.x - mouthLeft.x);
      const mouthHeight = Math.abs(mouthBot.y - mouthTop.y);
      const mouthInnerHeight = Math.abs(mouthBotInner.y - mouthTopInner.y);
      const mouthOpen = mouthHeight / mouthWidth;
      const jawTension = mouthInnerHeight < 0.007 && mouthHeight < 0.009;
      const mouthCenterY = (mouthTop.y + mouthBot.y) / 2;
      const cornerAvgY = (mouthLeft.y + mouthRight.y) / 2;
      const cornerDiff = mouthCenterY - cornerAvgY;
      
      const scores = { happy: 0, sad: 0, angry: 0, surprised: 0, fearful: 0, neutral: 0 };
      
      if (cornerDiff > 0.008 && mouthWidth > 0.065) {
        scores.happy = Math.min(1, cornerDiff * 60 + (mouthWidth - 0.065) * 8);
      }
      
      if (cornerDiff < -0.006 || (avgEyeOpen < 0.012 && browToEyeDist < 0.028)) {
        scores.sad = Math.min(1, Math.abs(cornerDiff) * 50 + (0.012 - avgEyeOpen) * 40);
      }
      
      let angerScore = 0;
      if (avgEyeOpen < 0.013) angerScore += 0.35;
      if (jawTension) angerScore += 0.45;
      if (browToEyeDist < 0.029) angerScore += 0.35;
      if (mouthOpen < 0.12 && cornerDiff > -0.005 && cornerDiff < 0.005) angerScore += 0.25;
      scores.angry = Math.min(1, angerScore);
      
      if (avgEyeOpen > 0.018 && mouthOpen > 0.35 && browToEyeDist > 0.036) {
        scores.surprised = Math.min(1, (avgEyeOpen - 0.018) * 60 + (mouthOpen - 0.35) * 2.5);
      }
      
      if (avgEyeOpen > 0.017 && mouthOpen > 0.2 && mouthOpen < 0.4 && browToEyeDist > 0.034) {
        scores.fearful = Math.min(1, (avgEyeOpen - 0.017) * 50 + (mouthOpen - 0.2) * 2);
      }
      
      const totalExp = scores.happy + scores.sad + scores.angry + scores.surprised + scores.fearful;
      scores.neutral = Math.max(0, 1 - totalExp * 0.8);
      
      const total = Object.values(scores).reduce((a, b) => a + b, 0);
      if (total > 0) {
        for (const key in scores) { scores[key] = scores[key] / total; }
      }
      
      return scores;
    }

    async function loadModels() {
      const lt = $('ldTxt'), ls = $('ldSub'), lb = $('ldBar');
      try {
        lt.textContent = 'Hazırlanıyor...';
        ls.textContent = 'Yapay zeka başlatılıyor';
        lb.style.width = '10%';
        await tf.ready();
        await tf.setBackend('webgl');
        lb.style.width = '20%';
        lt.textContent = 'Yüz modelleri yükleniyor...';
        ls.textContent = 'Duygu tanıma hazırlanıyor';
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        lb.style.width = '40%';
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        lb.style.width = '60%';
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        lb.style.width = '75%';
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
        lb.style.width = '85%';
        faceOK = true;
        lt.textContent = 'Nesne modeli yükleniyor...';
        ls.textContent = 'Nesneleri tanımaya hazırlanıyor';
        objModel = await cocoSsd.load();
        lb.style.width = '100%';
        lt.textContent = '✅ Hazır!';
        ls.textContent = 'Başlat butonuna tıkla!';
        setTimeout(() => $('ld').classList.add('hide'), 700);
      } catch (err) {
        console.error('Hata:', err);
        lt.textContent = '❌ Hata!';
        ls.textContent = 'Sayfayı yenile';
      }
    }

    async function startCam() {
      const vid = $('vid');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }
        });
        vid.srcObject = stream;
        return new Promise(r => {
          vid.onloadedmetadata = () => {
            const cv = $('cv');
            cv.width = vid.videoWidth;
            cv.height = vid.videoHeight;
            r();
          };
        });
      } catch (e) {
        alert('Kamera izni gerekli! 📷');
      }
    }

    async function detect() {
      if (!running) return;
      const vid = $('vid'), cv = $('cv'), ctx = cv.getContext('2d');
      const now = Date.now(), threshold = sens / 100;
      
      // 1. EKRAN BOYUTLARINI AL
      const displaySize = { width: vid.clientWidth, height: vid.clientHeight };
      
      // 2. CANVAS'I EKRANA EŞİTLE
      faceapi.matchDimensions(cv, displaySize);
      
      const dets = [];

      if (faceOK) {
        try {
          // Yüzleri tespit et
          let faces = await faceapi.detectAllFaces(vid, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.2 })).withFaceLandmarks().withFaceExpressions();
          if (faces.length === 0) faces = await faceapi.detectAllFaces(vid, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.25 })).withFaceLandmarks().withFaceExpressions();
          
          // 3. SONUÇLARI EKRAN BOYUTUNA GÖRE YENİDEN BOYUTLANDIR
          const resizedResults = faceapi.resizeResults(faces, displaySize);

          if (resizedResults.length > 0) {
            resizedResults.forEach(face => {
              const box = face.detection.box;
              
              // Kutu Çizimi
              ctx.strokeStyle = '#FFD93D';
              ctx.lineWidth = 5;
              ctx.shadowColor = '#FFD93D';
              ctx.shadowBlur = 20;
              ctx.strokeRect(box.x, box.y, box.width, box.height);
              ctx.shadowBlur = 0;

              // Landmark (Noktalar) Çizimi
              if (face.landmarks) {
                const pts = face.landmarks.positions;
                ctx.fillStyle = 'rgba(255, 217, 61, 0.9)';
                for (let i = 36; i <= 47; i++) { ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 2.5, 0, Math.PI * 2); ctx.fill(); }
                ctx.fillStyle = 'rgba(116, 185, 255, 0.9)';
                for (let i = 17; i <= 26; i++) { ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 2.5, 0, Math.PI * 2); ctx.fill(); }
                ctx.fillStyle = 'rgba(255, 118, 117, 0.9)';
                for (let i = 48; i <= 67; i++) { ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 2.5, 0, Math.PI * 2); ctx.fill(); }
              }
              
              // Analiz (Orijinal analiz fonksiyonunu koruduk)
              const landmarkScores = analyzeLandmarks(face.landmarks);
              const exp = face.expressions;
              const modelScores = { happy: exp.happy || 0, sad: exp.sad || 0, angry: exp.angry || 0, surprised: exp.surprised || 0, fearful: exp.fearful || 0, neutral: exp.neutral || 0 };
              
              const scores = {};
              for (const key in modelScores) {
                scores[key] = (landmarkScores?.[key] || 0) * 0.6 + modelScores[key] * 0.4;
              }
              
              let maxEmo = 'neutral', maxVal = 0;
              for (const [e, v] of Object.entries(scores)) { 
                if (v > maxVal) { maxVal = v; maxEmo = e; } 
              }
              
              const ed = emoData[maxEmo];
              $('bigEmo').textContent = ed.emoji;
              $('emoLbl').textContent = ed.tr;
              $('emoLbl').style.color = ed.color;
              $('emoConf').textContent = `%${Math.round(maxVal*100)} emin`;
              updateBars(scores);
              
              ctx.fillStyle = ed.color;
              ctx.fillRect(box.x, box.y + box.height + 5, 110, 32);
              ctx.fillStyle = 'white';
              ctx.font = 'bold 15px Poppins';
              ctx.fillText(`${ed.emoji} ${ed.tr}`, box.x + 6, box.y + box.height + 26);
              
              if (maxEmo !== curEmo && maxVal > threshold && now - tEmo > CD.emo) {
                curEmo = maxEmo;
                tEmo = now;
                $('bigEmo').classList.add('celebrate');
                setTimeout(() => $('bigEmo').classList.remove('celebrate'), 800);
                explode(maxEmo);
                miniEmojis(maxEmo);
                if (now - tMsg > CD.msg) {
                  tMsg = now;
                  const msgs = messages[maxEmo] || messages.neutral;
                  typeMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                }
              }
            });
          } else {
            $('emoLbl').textContent = 'Yüz bekleniyor...';
            $('emoConf').textContent = '';
          }
        } catch (e) { console.error('Yüz hatası:', e); }
      }

      if (objModel) {
        try {
          const preds = await objModel.detect(vid);
          preds.forEach(p => {
            // NESNE KOORDİNATLARINI MANUEL EŞİTLEME
            const scaleX = vid.clientWidth / vid.videoWidth;
            const scaleY = vid.clientHeight / vid.videoHeight;

            const x = p.bbox[0] * scaleX;
            const y = p.bbox[1] * scaleY;
            const w = p.bbox[2] * scaleX;
            const h = p.bbox[3] * scaleY;

            const info = objTr[p.class] || [p.class, '📦'];
            const conf = Math.round(p.score * 100);
            
            ctx.strokeStyle = '#a29bfe';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = 'rgba(162, 155, 254, 0.95)';
            ctx.fillRect(x, y - 28, 90, 26);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 13px Poppins';
            ctx.fillText(`${info[1]} ${info[0]}`, x + 4, y - 9);
            
            dets.push({ name: info[0], emoji: info[1], conf });
            
            if (p.class !== prevObj && conf > 65 && now - tObj > CD.obj) {
              prevObj = p.class;
              tObj = now;
              popup(info[0], info[1]);
              if (!foundSet.has(p.class)) foundSet.add(p.class);
            }
          });
        } catch (e) { console.error('Nesne hatası:', e); }
      }

      updateList(dets);
      if (running) requestAnimationFrame(detect);
    }

    function start() {
      running = true;
      $('goBtn').disabled = true;
      $('stopBtn').disabled = false;
      prevObj = ''; curEmo = 'neutral';
      tObj = tEmo = tMsg = 0;
      typeMessage('Kameraya bak ve yüz ifadeni göster! 😊');
      detect();
    }

    function stop() {
      running = false;
      $('goBtn').disabled = false;
      $('stopBtn').disabled = true;
      const cv = $('cv');
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, cv.width, cv.height);
      typeMessage('Durduruldu. Tekrar başlatmak için butona tıkla! 🚀');
    }

    $('goBtn').onclick = start;
    $('stopBtn').onclick = stop;
    $('sensSlider').oninput = function() { 
      sens = parseInt(this.value); 
      $('sensVal').textContent = sens + '%'; 
    };

    createStars();
    createBubbles();
    loadModels().then(startCam);
  </script>
</body>
</html>
